function Gettemplate()
{
   
    jQuery('#templateid').combogrid({
        panelWidth:450,
        idField:'questionnairetemplateid',
        textField:'questionnairetemplate_name',
        mode:'remote', 
        fitColumns:true,           
        url:'search_all.php?action=getquestionnairetemplate',   
         columns: [[
            {field:'questionnairetemplateid',title:'ID',hidden:true,width:100},
            {field:'questionnairetemplate_no',title:'หมายเลขเทมเพลตแบบสอบถาม',width:150},
            {field:'questionnairetemplate_name',title:'ชื่อเทมเพลตแบบสอบถาม',width:300}
        ]]
        ,"onSelect":function(index,record){
          //console.log(record.questionnairetemplate_name);
          var form = window.document.forms['EditView'];
          if(typeof(form.questionnairetemplate_name) != 'undefined'){
            form.questionnairetemplate_name.value = record.questionnairetemplate_name;
          }
          if(typeof(form.questionnairetemplateid) != 'undefined'){
            form.questionnairetemplateid.value = record.questionnairetemplateid;
          }

          if(typeof(form.questionnaire_name) != 'undefined'){
            form.questionnaire_name.value = record.questionnairetemplate_name;
          }
          Gettemplate_detail();

        }  
    });
}
function Gettemplate_detail() {
  
  jQuery.messager.progress({

                jQuery('.data_template').val(JSON.stringify(result.data));

            });

            jQuery("#surveyElement").Survey({model: survey});
            jQuery.messager.progress('close');

            jQuery.messager.alert({
                title: 'Information',
                msg: returndate['msg'],
            });
            jQuery.messager.progress('close');
